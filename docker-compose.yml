services:
  mysql:
    image: mysql:8.0
    container_name: stardew-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-stardew123}
      MYSQL_DATABASE: stardew_planner
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    ports:
      - "13307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./server/src/main/resources/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./server/src/main/resources/init.sql:/docker-entrypoint-initdb.d/02-init.sql
    networks:
      - stardew-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: stardew-backend
    ports:
      - "18080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/stardew_planner?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&characterEncoding=UTF-8
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME:-root}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-stardew123}
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - stardew-net
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 5s
      start_period: 60s
      retries: 5

  frontend:
    build:
      context: ./front
      dockerfile: Dockerfile
    container_name: stardew-frontend
    ports:
      - "9999:9999"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - stardew-net

volumes:
  mysql_data:

networks:
  stardew-net:
    driver: bridge
